<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article • intothefuter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #d4af37, #f7ef8a); border-radius: 4px; }
  </style>
  <meta name="description" content="Premium cannabis culture articles by intothefuter" />
</head>
<body class="bg-gray-950 text-white leading-relaxed">

  <nav id="navbar" class="fixed top-0 w-full z-50 bg-gray-950/90 backdrop-blur-lg transition-all duration-300 ease-in-out border-b border-yellow-800/20">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="/" class="flex flex-col items-start space-y-0.5">
          <span class="text-2xl sm:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-amber-400 to-yellow-200 tracking-wider">intothefuter</span>
          <span class="text-xs sm:text-sm italic text-amber-500 tracking-wide">The next dimension of cannabis</span>
        </a>
        <div class="hidden md:flex items-center space-x-8 lg:space-x-12">
          <a href="/" class="text-gray-200 hover:text-amber-400 font-medium text-lg transition-colors duration-300 relative group">Home<span class="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-300 group-hover:w-full"></span></a>
          <a href="/index.html#featured" class="text-gray-200 hover:text-amber-400 font-medium text-lg transition-colors duration-300 relative group">Latest<span class="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-300 group-hover:w-full"></span></a>
          <a href="/index.html#categories" class="text-gray-200 hover:text-amber-400 font-medium text-lg transition-colors duration-300 relative group">Categories<span class="absolute bottom-0 left-0 w-0 h-0.5 bg-amber-400 transition-all duration-300 group-hover:w-full"></span></a>
        </div>
      </div>
    </div>
  </nav>

  <main class="pt-24 pb-16">
    <section class="bg-gray-900 py-10">
      <div class="container mx-auto px-4 sm:px-6 lg:px-8">
        <div id="post-root" class="max-w-3xl mx-auto">
          <div class="animate-pulse">
            <div class="h-8 w-3/4 bg-gray-700 rounded mb-4"></div>
            <div class="h-4 w-1/3 bg-gray-700 rounded mb-8"></div>
            <div class="h-64 bg-gray-800 rounded mb-8"></div>
            <div class="space-y-3">
              <div class="h-4 bg-gray-800 rounded"></div>
              <div class="h-4 bg-gray-800 rounded w-5/6"></div>
              <div class="h-4 bg-gray-800 rounded w-2/3"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="bg-gray-950 py-16 border-t border-yellow-800/20">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 text-center text-gray-500 text-xs">
      <p>&copy; 2025 intothefuter. All rights reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
